name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      needs-rust: ${{ steps.filter.outputs.needs-rust }}
      needs-python: ${{ steps.filter.outputs.needs-python }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            needs-rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
            needs-python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'

  rust:
    name: Rust
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.needs-rust == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets

  python:
    name: Python
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.needs-python == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check Python lint
        run: uv run ruff check apps/sim_loop

      - name: Run Python tests
        run: uv run pytest apps/sim_loop/tests
